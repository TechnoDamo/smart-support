services:
  embedding:
    profiles: ["local-ai", "local-embedding"]
    platform: "${DOCKER_PLATFORM:-linux/amd64}"
    image: "${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.5}"
    container_name: smart-support-embedding
    command: >
      --model-id ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      --served-model-name ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      --hostname 0.0.0.0
      --port 8000
      --trust-remote-code
    ports:
      - "${EMBEDDING_PORT:-8090}:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      - "${EMBEDDING_MODEL_STORAGE_FOLDER:-./.data}:/data"
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  smart-support:
    name: smart-support
    driver: bridge
