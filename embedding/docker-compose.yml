services:
  embedding:
    profiles: ["local-embedding"]
    image: "${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:86-1.5}"
    container_name: smart-support-embedding
    command: >
      --model-id /data/${EMBEDDING_MODEL_LOCAL:-bge-small-en-v1.5}
      --hostname 0.0.0.0
      --port 8000
    ports:
      - "${EMBEDDING_PORT:-8090}:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      - "${EMBEDDING_MODELS_DIR:-../models}:/data"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  smart-support:
    name: smart-support
    driver: bridge
