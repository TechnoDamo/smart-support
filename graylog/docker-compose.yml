services:
  mongodb:
    image: mongo:6
    container_name: graylog-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=graylog
    volumes:
      - mongodb_data:/data/db
    networks:
      - graylog

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.23
    container_name: graylog-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - graylog

  graylog:
    image: graylog/graylog:5.2
    container_name: graylog
    restart: unless-stopped
    environment:
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:19000/
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET:-some16characterpwd}
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918} # admin
      - GRAYLOG_ROOT_TIMEZONE=UTC
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    ports:
      - "19000:9000"   # Web UI (changed from 9000 to 19000)
      - "12201:12201" # GELF TCP
      - "12201:12201/udp" # GELF UDP
      - "1514:1514"   # Syslog TCP
      - "1514:1514/udp" # Syslog UDP
      - "5555:5555"   # Raw TCP
      - "5555:5555/udp" # Raw UDP
    volumes:
      - graylog_data:/usr/share/graylog/data
      - graylog_journal:/usr/share/graylog/journal
    depends_on:
      - mongodb
      - elasticsearch
    networks:
      - graylog

networks:
  graylog:
    driver: bridge

volumes:
  mongodb_data:
  graylog_data:
  graylog_journal:
