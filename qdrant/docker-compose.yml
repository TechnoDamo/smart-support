# Qdrant — векторное хранилище для гибридного RAG-поиска (dense + sparse).
services:
  qdrant:
    image: "${QDRANT_IMAGE:-qdrant/qdrant:v1.12.0}"
    container_name: smart-support-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:

networks:
  smart-support:
    name: smart-support
    driver: bridge
