openapi: 3.0.3
info:
  title: API оператора Smart Support
  version: 1.0.0
  description: |
    API оператора для тикетов, чатов, сообщений, AI-подсказок и RAG-документов.
servers:
  - url: http://127.0.0.1:8081/api/v1

tags:
  - name: Тикеты
  - name: Чаты
  - name: Сообщения
  - name: Подсказки
  - name: Настройки
  - name: RAG
  - name: Аналитика

paths:
  /tickets:
    get:
      tags: [Тикеты]
      summary: Получить список тикетов
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TicketStatusCode'
      responses:
        '200':
          description: Список тикетов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'

  /tickets/{ticket_id}:
    get:
      tags: [Тикеты]
      summary: Получить детали тикета
      parameters:
        - $ref: '#/components/parameters/TicketId'
      responses:
        '200':
          description: Детали тикета
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketDetails'
    patch:
      tags: [Тикеты]
      summary: Переименовать тикет
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
      responses:
        '200':
          description: Тикет переименован
          content:
            application/json:
              schema:
                type: object
                required: [id, title, updated_at]
                properties:
                  id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  updated_at:
                    type: string
                    format: date-time

  /chats:
    get:
      tags: [Чаты]
      summary: Получить список чатов
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - in: query
          name: mode_code
          schema:
            $ref: '#/components/schemas/ChatModeCode'
      responses:
        '200':
          description: Список чатов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'

  /chats/{chat_id}:
    get:
      tags: [Чаты]
      summary: Получить детали чата
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Детали чата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetails'

  /chats/{chat_id}/mode:
    post:
      tags: [Чаты]
      summary: Изменить режим чата
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_mode_code]
              properties:
                to_mode_code:
                  $ref: '#/components/schemas/ChatModeCode'
                reason:
                  type: string
      responses:
        '200':
          description: Режим изменен
          content:
            application/json:
              schema:
                type: object
                required: [chat_id, mode_code, changed_at]
                properties:
                  chat_id:
                    type: string
                    format: uuid
                  mode_code:
                    $ref: '#/components/schemas/ChatModeCode'
                  changed_at:
                    type: string
                    format: date-time

  /chats/{chat_id}/messages:
    post:
      tags: [Сообщения]
      summary: Отправить сообщение пользователю
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id, text]
              properties:
                ticket_id:
                  type: string
                  format: uuid
                text:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Сообщение отправлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /chats/{chat_id}/suggestions:
    post:
      tags: [Подсказки]
      summary: Получить AI-подсказки
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id]
              properties:
                ticket_id:
                  type: string
                  format: uuid
                draft_context:
                  type: string
                max_suggestions:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 3
      responses:
        '200':
          description: Список подсказок
          content:
            application/json:
              schema:
                type: object
                required: [suggestions]
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Suggestion'

  /settings/default-new-ticket-mode:
    put:
      tags: [Настройки]
      summary: Установить режим по умолчанию для новых тикетов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode_code]
              properties:
                mode_code:
                  $ref: '#/components/schemas/ChatModeCode'
      responses:
        '200':
          description: Режим по умолчанию обновлен
          content:
            application/json:
              schema:
                type: object
                required: [mode_code, updated_at]
                properties:
                  mode_code:
                    $ref: '#/components/schemas/ChatModeCode'
                  updated_at:
                    type: string
                    format: date-time

  /rag/documents:
    get:
      tags: [RAG]
      summary: Получить список RAG-документов
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - in: query
          name: include_deleted
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: RAG-документы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagDocumentListResponse'
    post:
      tags: [RAG]
      summary: Загрузить RAG-документ
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [source_type, source_name, file]
              properties:
                source_type:
                  type: string
                  enum: [telegram_upload]
                source_name:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Загрузка принята
          content:
            application/json:
              schema:
                type: object
                required: [document_id, ingestion_job_id, status]
                properties:
                  document_id:
                    type: string
                    format: uuid
                  ingestion_job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued, processing, done, failed]

  /analytics/report:
    get:
      tags: [Аналитика]
      summary: Получить аналитический отчёт
      description: |
        Возвращает сводный отчёт по всей системе за указанный период.
        Каждый объект в ответе соответствует отдельному разделу аналитики.
        Если параметры периода не указаны — данные за последние 7 дней.
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
          description: Начало периода (включительно)
        - in: query
          name: to
          schema:
            type: string
            format: date-time
          description: Конец периода (включительно)
      responses:
        '200':
          description: Аналитический отчёт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsReport'

  /rag/documents/{document_id}:
    delete:
      tags: [RAG]
      summary: Удалить RAG-документ (мягкое удаление)
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Документ удален
          content:
            application/json:
              schema:
                type: object
                required: [document_id, deleted_at]
                properties:
                  document_id:
                    type: string
                    format: uuid
                  deleted_at:
                    type: string
                    format: date-time

components:
  parameters:
    TicketId:
      in: path
      name: ticket_id
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      in: path
      name: chat_id
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      in: path
      name: document_id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    TicketStatusCode:
      type: string
      enum: [pending_ai, pending_human, pending_user, closed]

    ChatModeCode:
      type: string
      enum: [full_ai, no_ai, ai_assist]

    ActorEntity:
      type: string
      enum: [user, operator, ai_operator]

    Ticket:
      type: object
      required: [id, status_code, chat_id, time_started]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
          nullable: true
        status_code:
          $ref: '#/components/schemas/TicketStatusCode'
        chat_id:
          type: string
          format: uuid
        time_started:
          type: string
          format: date-time
        time_closed:
          type: string
          format: date-time
          nullable: true

    TicketStatusEvent:
      type: object
      required: [to_status_code, changed_by, created_at]
      properties:
        from_status_code:
          allOf:
            - $ref: '#/components/schemas/TicketStatusCode'
          nullable: true
        to_status_code:
          $ref: '#/components/schemas/TicketStatusCode'
        changed_by:
          $ref: '#/components/schemas/ActorEntity'
        changed_by_user_id:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    TicketDetails:
      allOf:
        - $ref: '#/components/schemas/Ticket'
        - type: object
          properties:
            status_events:
              type: array
              items:
                $ref: '#/components/schemas/TicketStatusEvent'

    TicketListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    Chat:
      type: object
      required: [id, telegram_chat_id, user_id, channel, mode_code, updated_at]
      properties:
        id:
          type: string
          format: uuid
        telegram_chat_id:
          type: integer
          format: int64
        user_id:
          type: string
          format: uuid
        channel:
          $ref: '#/components/schemas/Channel'
        mode_code:
          $ref: '#/components/schemas/ChatModeCode'
        active_ticket_id:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time

    ChatListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Chat'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    Channel:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: telegram
        name:
          type: string

    ChatModeEvent:
      type: object
      required: [to_mode_code, changed_by, created_at]
      properties:
        from_mode_code:
          allOf:
            - $ref: '#/components/schemas/ChatModeCode'
          nullable: true
        to_mode_code:
          $ref: '#/components/schemas/ChatModeCode'
        changed_by:
          $ref: '#/components/schemas/ActorEntity'
        changed_by_user_id:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      required: [id, chat_id, ticket_id, entity, seq, text, time]
      properties:
        id:
          type: string
          format: uuid
        chat_id:
          type: string
          format: uuid
        ticket_id:
          type: string
          format: uuid
        entity:
          $ref: '#/components/schemas/ActorEntity'
        seq:
          type: integer
        text:
          type: string
        time:
          type: string
          format: date-time

    ChatDetails:
      allOf:
        - $ref: '#/components/schemas/Chat'
        - type: object
          properties:
            mode_events:
              type: array
              items:
                $ref: '#/components/schemas/ChatModeEvent'
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'

    Suggestion:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
        text:
          type: string
        confidence:
          type: number
          nullable: true
        citations:
          type: array
          items:
            type: object
            required: [chunk_id, document_id, score]
            properties:
              chunk_id:
                type: string
                format: uuid
              document_id:
                type: string
                format: uuid
              score:
                type: number

    RagDocument:
      type: object
      required: [id, collection_id, source_type, source_name, current_version, created_at]
      properties:
        id:
          type: string
          format: uuid
        collection_id:
          type: string
          format: uuid
        source_type:
          type: string
        source_name:
          type: string
        current_version:
          type: integer
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    RagDocumentListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RagDocument'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    AnalyticsReport:
      type: object
      required: [generated_at, period, tickets, messages, ai_performance, rag, users]
      properties:
        generated_at:
          type: string
          format: date-time
          description: Момент формирования отчёта
        period:
          type: object
          required: [from, to]
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        tickets:
          $ref: '#/components/schemas/AnalyticsTickets'
        messages:
          $ref: '#/components/schemas/AnalyticsMessages'
        ai_performance:
          $ref: '#/components/schemas/AnalyticsAiPerformance'
        rag:
          $ref: '#/components/schemas/AnalyticsRag'
        users:
          $ref: '#/components/schemas/AnalyticsUsers'

    AnalyticsTickets:
      description: Статистика по тикетам
      type: object
      required: [total, by_status, opened_in_period, closed_in_period]
      properties:
        total:
          type: integer
          description: Всего тикетов в системе
        by_status:
          type: object
          required: [pending_ai, pending_human, closed]
          properties:
            pending_ai:
              type: integer
            pending_human:
              type: integer
            closed:
              type: integer
        opened_in_period:
          type: integer
          description: Открыто тикетов за период
        closed_in_period:
          type: integer
          description: Закрыто тикетов за период
        avg_resolution_time_seconds:
          type: number
          nullable: true
          description: Среднее время закрытия тикета (сек), null если нет закрытых тикетов
        resolution_time_p50_seconds:
          type: number
          nullable: true
          description: Медианное время закрытия (сек)
        resolution_time_p95_seconds:
          type: number
          nullable: true
          description: 95-й перцентиль времени закрытия (сек)

    AnalyticsMessages:
      description: Статистика по сообщениям
      type: object
      required: [total, in_period, by_entity, avg_per_ticket]
      properties:
        total:
          type: integer
          description: Всего сообщений в системе
        in_period:
          type: integer
          description: Сообщений за период
        by_entity:
          type: object
          required: [user, ai_operator, operator]
          description: Разбивка по отправителю (все данные за период)
          properties:
            user:
              type: integer
            ai_operator:
              type: integer
            operator:
              type: integer
        avg_per_ticket:
          type: number
          nullable: true
          description: Среднее число сообщений на тикет (по тикетам периода)

    AnalyticsAiPerformance:
      description: Эффективность ИИ-оператора
      type: object
      required:
        - tickets_closed_by_ai
        - tickets_escalated_to_human
        - resolution_rate
        - escalation_rate
        - chat_mode_distribution
      properties:
        tickets_closed_by_ai:
          type: integer
          description: Тикеты, закрытые ИИ за период
        tickets_escalated_to_human:
          type: integer
          description: Тикеты, переданные оператору-человеку за период (pending_ai → pending_human)
        resolution_rate:
          type: number
          format: float
          description: Доля тикетов, закрытых ИИ (0–1)
        escalation_rate:
          type: number
          format: float
          description: Доля тикетов, переданных человеку (0–1)
        avg_messages_before_escalation:
          type: number
          nullable: true
          description: Среднее число сообщений до передачи тикета оператору
        chat_mode_distribution:
          type: object
          required: [full_ai, ai_assist, no_ai]
          description: Текущее распределение режимов по всем чатам
          properties:
            full_ai:
              type: integer
            ai_assist:
              type: integer
            no_ai:
              type: integer

    AnalyticsRag:
      description: Состояние базы знаний и качество RAG-поиска
      type: object
      required: [total_documents, active_documents, deleted_documents, total_chunks, ingestion_jobs, retrieval]
      properties:
        total_documents:
          type: integer
        active_documents:
          type: integer
        deleted_documents:
          type: integer
        total_chunks:
          type: integer
          description: Активных чанков во всех коллекциях
        ingestion_jobs:
          type: object
          required: [queued, processing, done, failed]
          description: Текущее состояние задач обработки документов
          properties:
            queued:
              type: integer
            processing:
              type: integer
            done:
              type: integer
            failed:
              type: integer
        retrieval:
          type: object
          required: [total_events, events_in_period, avg_score, hit_rate]
          properties:
            total_events:
              type: integer
              description: Всего RAG-запросов в системе
            events_in_period:
              type: integer
              description: RAG-запросов за период
            avg_score:
              type: number
              nullable: true
              description: Средний score retrieved chunks за период
            hit_rate:
              type: number
              nullable: true
              format: float
              description: Доля чанков, реально использованных в ответе (used_in_answer=true), за период (0–1)

    AnalyticsUsers:
      description: Статистика по пользователям
      type: object
      required: [total, new_in_period, returning_users_in_period, avg_tickets_per_user]
      properties:
        total:
          type: integer
          description: Всего пользователей в системе
        new_in_period:
          type: integer
          description: Новых пользователей за период (первое появление в системе)
        returning_users_in_period:
          type: integer
          description: Пользователей, уже существовавших до периода и активных в нём
        avg_tickets_per_user:
          type: number
          nullable: true
          description: Среднее число тикетов на пользователя (по всем данным)
