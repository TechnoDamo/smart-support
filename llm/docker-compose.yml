services:
  llm:
    profiles: ["local-llm"]
    image: "${VLLM_IMAGE:-vllm/vllm-openai:v0.6.3}"
    container_name: smart-support-llm
    entrypoint: ["/bin/sh", "/opt/smart-support/start-vllm.sh"]
    ports:
      - "${LLM_PORT:-8091}:8080"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
      LLM_MODEL_LOCAL: "${LLM_MODEL_LOCAL:-qwen2.5-0.5b-instruct}"
      LLM_CTX_SIZE: "${LLM_CTX_SIZE:-2048}"
      LLM_DTYPE: "${LLM_DTYPE:-bfloat16}"
    volumes:
      - "${LLM_MODELS_DIR:-../models}:/models"
      - "./start-vllm.sh:/opt/smart-support/start-vllm.sh:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  smart-support:
    name: smart-support
    driver: bridge
