services:
  llm:
    profiles: ["local-ai", "local-llm"]
    platform: "${DOCKER_PLATFORM:-linux/amd64}"
    image: "${VLLM_IMAGE:-vllm/vllm-openai:v0.6.3}"
    container_name: smart-support-llm
    command: >
      --model ${LLM_MODEL_LOCAL:-Qwen/Qwen2.5-0.5B-Instruct}
      --served-model-name ${LLM_MODEL_LOCAL:-Qwen/Qwen2.5-0.5B-Instruct}
      --host 0.0.0.0
      --port 8080
      --device ${LLM_DEVICE:-cpu}
      --dtype ${LLM_DTYPE:-float32}
      --max-model-len ${LLM_CTX_SIZE:-2048}
      --trust-remote-code
    ports:
      - "${LLM_PORT:-8091}:8080"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
      HF_HOME: /models
      VLLM_CPU_KVCACHE_SPACE: "${VLLM_CPU_KVCACHE_SPACE:-4}"
    volumes:
      - "${LLM_MODEL_STORAGE_FOLDER:-./models}:/models"
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  smart-support:
    name: smart-support
    driver: bridge
