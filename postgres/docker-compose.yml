# PostgreSQL — основная реляционная БД. Запускается как отдельно, так и в составе корневого docker-compose.
services:
  postgres:
    image: postgres:16
    container_name: smart-support-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart}
      POSTGRES_DB: ${POSTGRES_DB:-smart}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smart-support

volumes:
  postgres_data:

networks:
  smart-support:
    name: smart-support
    driver: bridge
