services:
  minio:
    profiles: ["local-object-storage"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: smart-support-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smart}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartminio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - smart-support
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    profiles: ["local-object-storage"]
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: smart-support-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-smart} ${MINIO_ROOT_PASSWORD:-smartminio123} &&
      mc mb --ignore-existing local/${S3_BUCKET:-smart-support} &&
      mc anonymous set private local/${S3_BUCKET:-smart-support}
      "
    networks:
      - smart-support
    restart: 'no'

volumes:
  minio_data:

networks:
  smart-support:
    name: smart-support
    driver: bridge
